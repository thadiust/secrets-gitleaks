name: "Gitleaks secrets scan"
description: "Run Gitleaks to detect hardcoded secrets; does not print secret values in logs"

outputs:
  secret_count:
    description: "Number of findings reported by Gitleaks"
    value: ${{ steps.gitleaks.outputs.secret_count }}
  scan_status:
    description: "Final scan status (clean, findings_found, scanner_error)"
    value: ${{ steps.gitleaks.outputs.scan_status }}
  sarif_path:
    description: "Repo-relative path to the SARIF report when write_sarif is true (empty otherwise)"
    value: ${{ steps.gitleaks.outputs.sarif_path }}

inputs:
  gitleaks_version:
    description: "Exact Gitleaks release version (no v prefix)"
    required: false
    default: "8.18.4"

  working_directory:
    description: "Directory to scan (repo root relative). With no_git=false (default), this must be a git repository. With no_git=true, a plain directory tree is enough."
    required: false
    default: "."

  config_path:
    description: "Optional Gitleaks config path relative to working_directory (e.g. .gitleaks.toml)"
    required: false
    default: ""

  baseline_path:
    description: "Optional baseline report path relative to working_directory (existing findings ignored)"
    required: false
    default: ""

  no_git:
    description: "If true, scan files only (--no-git) instead of git history"
    required: false
    default: "false"

  fail_on_findings:
    description: "Fail the action when one or more findings are reported"
    required: false
    default: "true"

  write_sarif:
    description: "Write a SARIF 2.1 report to sarif_filename (for GitHub Code Scanning upload)"
    required: false
    default: "false"

  sarif_filename:
    description: "SARIF file path relative to working_directory (used when write_sarif is true)"
    required: false
    default: "gitleaks-results.sarif"

runs:
  using: "composite"
  steps:
    - name: Validate inputs
      shell: bash
      run: |
        set -euo pipefail
        WD="${{ inputs.working_directory }}"
        if [ -z "$WD" ]; then
          echo "working_directory must be a non-empty relative path." >&2
          exit 1
        fi
        case "$WD" in
          /*)
            echo "working_directory must be relative (no leading slash): $WD" >&2
            exit 1
            ;;
        esac
        if [[ "$WD" =~ (^|/)\.\.(/|$) ]]; then
          echo "working_directory must not traverse parents (..): $WD" >&2
          exit 1
        fi
        if [ ! -d "$GITHUB_WORKSPACE/$WD" ]; then
          echo "working_directory not found or not a directory: $WD" >&2
          exit 1
        fi

        case "${{ inputs.fail_on_findings }}" in
          true|false) ;;
          *)
            echo "Unsupported fail_on_findings: ${{ inputs.fail_on_findings }}. Use true or false." >&2
            exit 1
            ;;
        esac
        case "${{ inputs.no_git }}" in
          true|false) ;;
          *)
            echo "Unsupported no_git: ${{ inputs.no_git }}. Use true or false." >&2
            exit 1
            ;;
        esac
        case "${{ inputs.write_sarif }}" in
          true|false) ;;
          *)
            echo "Unsupported write_sarif: ${{ inputs.write_sarif }}. Use true or false." >&2
            exit 1
            ;;
        esac

        CONFIG_PATH="${{ inputs.config_path }}"
        if [ -n "$CONFIG_PATH" ]; then
          case "$CONFIG_PATH" in
            /*)
              echo "config_path must be relative (no leading slash): $CONFIG_PATH" >&2
              exit 1
              ;;
          esac
          if [[ "$CONFIG_PATH" =~ (^|/)\.\.(/|$) ]]; then
            echo "config_path must not traverse parents (..): $CONFIG_PATH" >&2
            exit 1
          fi
          if [ ! -f "$GITHUB_WORKSPACE/$WD/$CONFIG_PATH" ]; then
            echo "Gitleaks config not found: $WD/$CONFIG_PATH" >&2
            exit 1
          fi
        fi

        BASELINE_PATH="${{ inputs.baseline_path }}"
        if [ -n "$BASELINE_PATH" ]; then
          case "$BASELINE_PATH" in
            /*)
              echo "baseline_path must be relative (no leading slash): $BASELINE_PATH" >&2
              exit 1
              ;;
          esac
          if [[ "$BASELINE_PATH" =~ (^|/)\.\.(/|$) ]]; then
            echo "baseline_path must not traverse parents (..): $BASELINE_PATH" >&2
            exit 1
          fi
          if [ ! -f "$GITHUB_WORKSPACE/$WD/$BASELINE_PATH" ]; then
            echo "Gitleaks baseline not found: $WD/$BASELINE_PATH" >&2
            exit 1
          fi
        fi

        SARIF_NAME="${{ inputs.sarif_filename }}"
        if [ -z "$SARIF_NAME" ]; then
          echo "sarif_filename must be non-empty (use write_sarif=false to skip SARIF)." >&2
          exit 1
        fi
        case "$SARIF_NAME" in
          /*)
            echo "sarif_filename must be relative (no leading slash): $SARIF_NAME" >&2
            exit 1
            ;;
        esac
        if [[ "$SARIF_NAME" =~ (^|/)\.\.(/|$) ]]; then
          echo "sarif_filename must not traverse parents (..): $SARIF_NAME" >&2
          exit 1
        fi

    - name: Install Gitleaks
      shell: bash
      run: |
        set -euo pipefail
        VERSION="${{ inputs.gitleaks_version }}"
        ASSET="gitleaks_${VERSION}_linux_x64.tar.gz"
        BASE_URL="https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}"
        # Upstream publishes checksums next to tarballs; verify SHA256 before extract (TLS + `-f` is not enough for binary integrity).
        curl -fSL "${BASE_URL}/gitleaks_${VERSION}_checksums.txt" -o /tmp/gitleaks_checksums.txt
        curl -fSL "${BASE_URL}/${ASSET}" -o "/tmp/${ASSET}"
        EXPECTED="$(awk -v f="${ASSET}" '$2 == f { print $1; exit }' /tmp/gitleaks_checksums.txt)"
        if [ -z "${EXPECTED}" ]; then
          echo "No SHA256 line for ${ASSET} in upstream checksums (wrong gitleaks_version or renamed asset?)." >&2
          exit 1
        fi
        ACTUAL="$(sha256sum "/tmp/${ASSET}" | awk '{ print $1 }')"
        if [ "${EXPECTED}" != "${ACTUAL}" ]; then
          echo "SHA256 mismatch for ${ASSET} (expected ${EXPECTED}, got ${ACTUAL})." >&2
          exit 1
        fi
        rm -f /tmp/gitleaks_checksums.txt
        tar -xzf "/tmp/${ASSET}" -C /tmp
        rm -f "/tmp/${ASSET}"
        chmod +x /tmp/gitleaks
        /tmp/gitleaks version

    - name: Run Gitleaks
      id: gitleaks
      shell: bash
      working-directory: ${{ inputs.working_directory }}
      run: |
        set -euo pipefail

        if ! command -v jq >/dev/null 2>&1; then
          echo "jq is required but was not found on PATH (install jq on self-hosted runners)." >&2
          exit 1
        fi

        WRITE_SARIF="${{ inputs.write_sarif }}"
        SARIF_NAME="${{ inputs.sarif_filename }}"

        if [ "$WRITE_SARIF" = "true" ]; then
          # SARIF is written into the working tree for upload / Code Scanning — not a temp file; no EXIT trap.
          report="${SARIF_NAME}"
          FORMAT="sarif"
          if [[ "$report" == */* ]]; then
            mkdir -p "$(dirname -- "$report")"
          fi
        else
          report="$(mktemp)"
          cleanup() { rm -f "$report"; }
          trap cleanup EXIT
          FORMAT="json"
        fi

        # Exit 0 even when leaks exist so we only gate on secret_count + fail_on_findings (not Gitleaks' exit convention).
        ARGS=( detect --source . --report-format "$FORMAT" --report-path "$report" --exit-code 0 --redact --no-banner )

        if [ "${{ inputs.no_git }}" = "true" ]; then
          ARGS+=( --no-git )
        fi

        if [ -n "${{ inputs.config_path }}" ]; then
          if [ ! -f "${{ inputs.config_path }}" ]; then
            echo "Gitleaks config not found: ${{ inputs.config_path }}" >&2
            exit 1
          fi
          ARGS+=( -c "${{ inputs.config_path }}" )
        fi

        if [ -n "${{ inputs.baseline_path }}" ]; then
          if [ ! -f "${{ inputs.baseline_path }}" ]; then
            echo "Gitleaks baseline not found: ${{ inputs.baseline_path }}" >&2
            exit 1
          fi
          ARGS+=( --baseline-path "${{ inputs.baseline_path }}" )
        fi

        set +e
        /tmp/gitleaks "${ARGS[@]}"
        gl_code=$?
        set -e

        secret_count=0
        if [ "$WRITE_SARIF" = "true" ]; then
          if [ -s "$report" ]; then
            secret_count="$(jq '[.runs[]?.results[]?] | length // 0' "$report" 2>/dev/null || echo 0)"
          fi
        else
          if [ -s "$report" ]; then
            secret_count="$(jq 'if type == "array" then length else 0 end' "$report" 2>/dev/null || echo 0)"
          fi
        fi

        if [ "$gl_code" -eq 126 ]; then
          echo "sarif_path=" >> "$GITHUB_OUTPUT"
          echo "scan_status=scanner_error" >> "$GITHUB_OUTPUT"
          echo "secret_count=0" >> "$GITHUB_OUTPUT"
          echo "Gitleaks failed with exit 126 (e.g. invalid flags)." >&2
          exit 126
        fi

        if [ "$gl_code" -ne 0 ]; then
          echo "sarif_path=" >> "$GITHUB_OUTPUT"
          echo "scan_status=scanner_error" >> "$GITHUB_OUTPUT"
          echo "secret_count=0" >> "$GITHUB_OUTPUT"
          echo "Gitleaks exited with code ${gl_code} (scanner or environment error)." >&2
          exit "${gl_code}"
        fi

        WD="${{ inputs.working_directory }}"
        if [ "$WRITE_SARIF" = "true" ]; then
          if [ "$WD" = "." ]; then
            echo "sarif_path=${SARIF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "sarif_path=${WD}/${SARIF_NAME}" >> "$GITHUB_OUTPUT"
          fi
        else
          echo "sarif_path=" >> "$GITHUB_OUTPUT"
        fi

        if [ "$secret_count" -gt 0 ]; then
          echo "scan_status=findings_found" >> "$GITHUB_OUTPUT"
        else
          echo "scan_status=clean" >> "$GITHUB_OUTPUT"
        fi
        echo "secret_count=${secret_count}" >> "$GITHUB_OUTPUT"

        if [ "$secret_count" -gt 0 ]; then
          echo "Gitleaks reported ${secret_count} finding(s). Rule, file, and line only (values are not printed):" >&2
          if [ "$WRITE_SARIF" = "true" ]; then
            jq -r '.runs[]?.results[]? | "  \(.ruleId // "unknown")  \(.locations[0].physicalLocation.artifactLocation.uri // "?"):\(.locations[0].physicalLocation.region.startLine // "?")"' "$report" 2>/dev/null | head -20 >&2 || true
          else
            jq -r '.[] | "  \(.RuleID // "unknown")  \(.File // "?"):\(.StartLine // "?")"' "$report" 2>/dev/null | head -20 >&2 || true
          fi
          if [ "$secret_count" -gt 20 ]; then
            echo "  ... output truncated (20 of ${secret_count} findings); see SARIF in Code Scanning or the report file." >&2
          fi
        else
          echo "No secrets reported by Gitleaks." >&2
        fi

        if [ "${{ inputs.fail_on_findings }}" = "true" ] && [ "$secret_count" -gt 0 ]; then
          exit 1
        fi

        exit 0
